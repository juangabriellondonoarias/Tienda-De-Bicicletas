version: "3.9"

services:
  # --- 1. BASE DE DATOS (MySQL) ---
  products-mysql:
    image: mysql:8.0
    container_name: products-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: JUAN1003
      MYSQL_DATABASE: tiendaBicicletas
      MYSQL_USER: juanycarlos
      MYSQL_PASSWORD: JuanYCarlos2026
    ports:
      - "3307:3306" # Acceso externo desde Workbench en el 3307
    volumes:
      - db_data:/var/lib/mysql
      # Asegúrate de que este archivo existe en esa ruta para que cree las tablas al iniciar
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u juanycarlos -pJuanYCarlos2026 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- 2. ADMINISTRADOR VISUAL (phpMyAdmin) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - products-mysql
    environment:
      PMA_HOST: products-mysql
      PMA_USER: root
      PMA_PASSWORD: JUAN1003
    ports:
      - "8081:80" # Acceso en http://localhost:8081

  # --- 3. TU APLICACIÓN (Spring Boot) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-api
    depends_on:
      products-mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://products-mysql:3306/tiendaBicicletas?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: juanycarlos
      SPRING_DATASOURCE_PASSWORD: JuanYCarlos2026
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data: