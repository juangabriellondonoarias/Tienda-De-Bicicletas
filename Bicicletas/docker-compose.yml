version: "3.9"

services:
  # --- 1. BASE DE DATOS LOCAL (OPCIONAL) ---
  # Nota: Ya no es estrictamente necesaria porque usaremos Railway,
  # pero la dejo por si quieres tener un respaldo local.
  products-mysql:
    image: mysql:8.0
    container_name: products-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: JUAN1003
      MYSQL_DATABASE: tiendaBicicletas
      MYSQL_USER: juanycarlos
      MYSQL_PASSWORD: JuanYCarlos2026
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u juanycarlos -pJuanYCarlos2026 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- 2. ADMINISTRADOR VISUAL ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - products-mysql
    environment:
      PMA_HOST: products-mysql
      PMA_USER: root
      PMA_PASSWORD: JUAN1003
    ports:
      - "8081:80"

  # --- 3. TU APLICACIÓN (CORREGIDA PARA RAILWAY) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-api
    # Eliminamos la dependencia del mysql local para que no falle si el local está apagado
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # USAMOS LA URL PÚBLICA DE RAILWAY AQUÍ 👇
      SPRING_DATASOURCE_URL: jdbc:mysql://crossover.proxy.rlwy.net:58771/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: aXuRIfHzdSwvlMWOMvuruucMkGIUycnH
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data: