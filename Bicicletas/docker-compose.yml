version: "3.9"

services:
  # Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: products-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: JUAN1003
      MYSQL_DATABASE: tiendaBicicletas
    ports:
      - "3307:3306" # Tu PC lo ve en el 3307, Docker internamente en el 3306
    volumes:
      - db_data:/var/lib/mysql

  # Administrador Visual (http://localhost:8081)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: JUAN1003
    ports:
      - "8081:80"

  # Tu Aplicación Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # IMPORTANTE: Aquí apuntamos al nombre del servicio 'db'
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/tiendaBicicletas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: JUAN1003
    restart: unless-stopped

volumes:
  db_data: